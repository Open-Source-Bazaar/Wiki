packages:
  - .
autoInstallPeers: false
overrides:
  next: $next
patchedDependencies:
  next@16.2.10: patches/next@16.2.10.patch
allowBuilds:
  '@sentry/cli': true
  core-js: true
  less: true
  sharp: true
  unrs-resolver: true
publicHoistPattern:
  - '*import-in-the-middle*'
  - '*require-in-the-middle*'
